[project]
name = "home-medicine-cabinet"
version = "0.6.0"
description = "Backend to manage home medicine cabinet"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]>=0.136.3",
    "sqlmodel>=0.0.22",
    "alembic>=1.16",
    "asyncpg>=0.30",
    "pydantic-settings>=2.14.2",
    "ruff>=0.15.15",
    "supabase>=2.15",
    "pyjwt[crypto]>=2.13.0",
    "coverage>=7.14.1",
    "psycopg2>=2.9.12",
    "pyright>=1.1.410",
    "cryptography>=48.0.1",
    "python-multipart>=0.0.31",
    "starlette>=1.3.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.15.1",
    "pytest-randomly>=4.1.0",
    "pyright>=1.1.390",
    "nodejs-wheel-binaries>=24.16.0",
    "testcontainers[postgres]>=4.9",
]

[tool.ruff.lint]
extend-select = ["D"]   # pydocstyle: check docstring formatting
ignore = ["D1"]         # but don't require docstrings to be present everywhere

[tool.ruff.lint.per-file-ignores]
"migrations/*" = ["D"]   # Alembic-generated files follow their own template

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
fail_under = 60
show_missing = true

[tool.pyright]
include = ["app"]
exclude = ["migrations", "**/__pycache__"]
pythonVersion = "3.13"
typeCheckingMode = "basic"
