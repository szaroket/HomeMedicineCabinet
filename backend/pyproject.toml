[project]
name = "home-medicine-cabinet"
version = "0.1.0"
description = "Backend to manage home medicine cabinet"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.136.3",
    "sqlmodel>=0.0.22",
    "alembic>=1.16",
    "asyncpg>=0.30",
    "pydantic-settings>=2.5",
    "ruff>=0.15.15",
    "supabase>=2.15",
    "pyjwt[crypto]>=2.13.0",
    "coverage>=7.14.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.15.1",
    "pytest-randomly>=4.1.0",
]

[tool.ruff.lint]
extend-select = ["D"]   # pydocstyle: check docstring formatting
ignore = ["D1"]         # but don't require docstrings to be present everywhere

[tool.ruff.lint.per-file-ignores]
"migrations/*" = ["D"]   # Alembic-generated files follow their own template

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
asyncio_mode = "auto"
