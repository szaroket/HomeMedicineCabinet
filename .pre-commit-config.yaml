repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: npx --prefix frontend eslint --fix
        types: [file]
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: true

      - id: prettier
        name: prettier
        language: system
        entry: npx --prefix frontend prettier --write
        types: [file]
        files: ^frontend/src/.*\.(ts|tsx|css)$
        pass_filenames: true
