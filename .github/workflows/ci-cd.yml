name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

jobs:
  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # SHA-pinned: 3rd-party action (supply-chain); GitHub-owned actions use major tags

      - name: Python vulnerability check (pip-audit)
        working-directory: backend
        run: uvx pip-audit -r <(uv export --no-dev --format requirements-txt)

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # SHA-pinned: 3rd-party action (supply-chain); GitHub-owned actions use major tags

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run pre-commit on all files
        uses: pre-commit/action@v3.0.1

  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # SHA-pinned: 3rd-party action (supply-chain); GitHub-owned actions use major tags

      - name: Install backend deps
        working-directory: backend
        run: uv sync --all-groups

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost/testdb"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
        run: uv run coverage run -m pytest --ignore=tests/db --ignore=tests/integration

      - name: Check coverage threshold
        working-directory: backend
        run: uv run coverage report

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # SHA-pinned: 3rd-party action (supply-chain); GitHub-owned actions use major tags

      - name: Install backend deps
        working-directory: backend
        run: uv sync --all-groups

      - name: Run pyright
        working-directory: backend
        run: uv run pyright

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:run

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run typecheck
        working-directory: frontend
        run: npm run typecheck

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # SHA-pinned: 3rd-party action (supply-chain); GitHub-owned actions use major tags

      - name: Install backend deps
        working-directory: backend
        run: uv sync --all-groups

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost/testdb"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
        run: uv run pytest tests/integration

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-shared-supabase
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7

      - name: Verify required E2E secrets are present
        run: |
          missing=()
          for name in DATABASE_URL SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY E2E_TEST_PASSWORD E2E_DATABASE_URL; do
            [ -z "${!name}" ] && missing+=("$name")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required E2E secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # SHA-pinned: 3rd-party action (supply-chain); GitHub-owned actions use major tags

      - name: Install backend deps
        working-directory: backend
        run: uv sync --all-groups

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs:
      - vulnerability-scan
      - pre-commit
      - backend-tests
      - frontend-build
      - backend-typecheck
      - frontend-unit
      - frontend-typecheck
      - backend-integration
      - frontend-e2e

    steps:
      - name: Deploy backend
        run: curl --fail "$RENDER_DEPLOY_HOOK_BACKEND"
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Deploy frontend
        run: curl --fail "$RENDER_DEPLOY_HOOK_FRONTEND"
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
