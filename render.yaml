services:
  - type: web
    name: home-medicine-cabinet-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run --active uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /api/v1/health/
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: static
    name: home-medicine-cabinet-frontend
    autoDeploy: false
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
